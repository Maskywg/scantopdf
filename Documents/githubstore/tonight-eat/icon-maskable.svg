<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable icon: safe zone = center 75% (192px padding all around in 512 space → 80px) -->
  <defs>
    <radialGradient id="bgG" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#251808"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </radialGradient>
    <radialGradient id="bwlG" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#d4820a"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full bleed background (for maskable) -->
  <rect width="512" height="512" fill="url(#bgG)"/>

  <!-- Gold ring -->
  <circle cx="256" cy="248" r="150" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.12"/>

  <!-- Bowl -->
  <ellipse cx="256" cy="300" rx="118" ry="26" fill="#1a1005"/>
  <path d="M138 248 Q138 338 256 348 Q374 338 374 248 Z" fill="#1c1208"/>
  <path d="M138 248 Q138 334 256 344 Q374 334 374 248"
    fill="none" stroke="url(#bwlG)" stroke-width="3.5"/>
  <ellipse cx="256" cy="248" rx="118" ry="22" fill="none"
    stroke="url(#bwlG)" stroke-width="4"/>
  <ellipse cx="256" cy="248" rx="118" ry="22" fill="#150e04" opacity="0.55"/>

  <!-- Noodles -->
  <g opacity="0.85" filter="url(#glow2)">
    <path d="M180 244 Q204 232 228 244 Q252 256 276 244 Q300 232 322 244"
      fill="none" stroke="#f5c842" stroke-width="4" stroke-linecap="round"/>
    <path d="M188 258 Q212 246 236 258 Q260 270 284 258 Q308 246 328 258"
      fill="none" stroke="#f5a623" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Chopsticks -->
  <g filter="url(#glow2)">
    <line x1="218" y1="118" x2="238" y2="225" stroke="#f5c842" stroke-width="6"
      stroke-linecap="round" opacity="0.9"/>
    <line x1="244" y1="114" x2="256" y2="223" stroke="#d4820a" stroke-width="5"
      stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Steam -->
  <g opacity="0.45" stroke="#f5a623" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M236 202 Q231 190 236 178 Q241 166 236 154"/>
    <path d="M256 198 Q251 183 256 170 Q261 157 256 144"/>
    <path d="M276 202 Q271 190 276 178 Q281 166 276 154"/>
  </g>

  <!-- Label -->
  <text x="256" y="410" text-anchor="middle"
    font-size="40" font-weight="900"
    font-family="-apple-system, 'PingFang TC', sans-serif"
    fill="#f5a623" letter-spacing="1">今晚吃什麼</text>
</svg>
