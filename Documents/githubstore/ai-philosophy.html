<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 哲學轉變</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1eb;
    --surface: #ffffff;
    --border: #d8d2c4;
    --text: #1e1c18;
    --muted: #7a7468;
    --accent1: #a8863a;
    --accent2: #3a9ab0;
    --accent3: #9050a0;
    --accent4: #2a9048;
    --accent5: #c04030;
    --accent6: #3060c0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #bgCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }

  header {
    text-align: center;
    margin-bottom: 70px;
    animation: fadeDown 0.9s ease forwards;
    background: #ffffff;
    border-radius: 16px;
    padding: 48px 32px 40px;
    border: 1px solid #d8d2c4;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  .header-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent1);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 300;
    line-height: 1.3;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 16px;
  }

  h1 em {
    font-style: normal;
    color: var(--accent1);
    font-weight: 700;
  }

  .subtitle {
    font-size: 1rem;
    color: #6a6460;
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto;
  }

  .progress-bar-wrap {
    width: 200px;
    height: 2px;
    background: var(--border);
    margin: 32px auto 0;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .cards-grid { display: grid; gap: 16px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    animation: fadeUp 0.6s ease both;
  }

  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
  .card.active { box-shadow: 0 0 0 1px var(--card-accent), 0 8px 40px rgba(0,0,0,0.5); border-color: var(--card-accent); }

  .card-header { display: flex; align-items: center; gap: 16px; padding: 20px 24px; }

  .card-icon {
    font-size: 1.8rem;
    flex-shrink: 0;
    width: 48px; height: 48px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.05);
  }

  .card-title-wrap { flex: 1; }

  .card-number {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--card-accent);
    letter-spacing: 3px;
    margin-bottom: 4px;
  }

  .card-title { font-size: 1.05rem; font-weight: 700; color: var(--text); line-height: 1.3; }

  .card-toggle {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: var(--muted);
    transition: transform 0.3s, color 0.3s;
    flex-shrink: 0;
  }

  .card.active .card-toggle { transform: rotate(45deg); color: var(--card-accent); }

  .read-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    border: 1px solid var(--border);
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s;
  }

  .card.read .read-dot { background: var(--card-accent); border-color: var(--card-accent); }

  .card-body { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1); }
  .card.active .card-body { max-height: 1000px; }

  .card-inner { padding: 20px 24px 24px; border-top: 1px solid var(--border); }

  .card-tagline { font-size: 0.95rem; color: var(--card-accent); font-style: italic; margin-bottom: 14px; }

  .card-text { font-size: 0.92rem; line-height: 1.9; color: #3a3630; margin-bottom: 18px; }

  .card-question-wrap {
    background: rgba(0,0,0,0.03);
    border-left: 3px solid var(--card-accent);
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    margin-bottom: 18px;
  }

  .card-question-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--card-accent);
    margin-bottom: 6px;
  }

  .card-question { font-size: 0.95rem; font-style: italic; color: var(--text); line-height: 1.6; }

  .thinker-section { margin-top: 18px; }

  .thinker-section-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 10px;
    display: block;
  }

  .thinker-chips { display: flex; flex-wrap: wrap; gap: 8px; }

  .chip {
    background: rgba(0,0,0,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.8rem;
    color: #3a3850;
    padding: 5px 14px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    user-select: none;
  }

  .chip:hover { background: rgba(0,0,0,0.1); color: #1e1c18; }
  .chip.open { background: rgba(0,0,0,0.07); border-color: var(--card-accent); color: var(--card-accent); }

  .thinker-detail {
    display: none;
    background: rgba(0,0,0,0.03);
    border: 1px solid var(--border);
    border-left: 3px solid var(--card-accent);
    border-radius: 0 10px 10px 0;
    padding: 16px 18px;
    margin-top: 10px;
    animation: fadeUp 0.25s ease both;
  }

  .thinker-detail.show { display: block; }

  .thinker-detail-name { font-size: 0.95rem; font-weight: 700; color: var(--card-accent); margin-bottom: 2px; }

  .thinker-detail-era {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .thinker-detail-view { font-size: 0.88rem; line-height: 1.8; color: #4a4640; }

  .thinker-wiki-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--card-accent);
    text-decoration: none;
    opacity: 0.85;
    transition: opacity 0.2s;
  }

  .thinker-wiki-link:hover { opacity: 1; text-decoration: underline; }

  .reflect-wrap { margin-top: 20px; }

  .reflect-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: #7a7468;
    margin-bottom: 8px;
    display: block;
  }

  .reflect-input {
    width: 100%;
    background: rgba(0,0,0,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 0.88rem;
    padding: 10px 14px;
    resize: none;
    min-height: 72px;
    transition: border-color 0.2s;
    outline: none;
  }

  .reflect-input:focus { border-color: var(--card-accent); }
  .reflect-input::placeholder { color: var(--muted); }

  .reflect-save-btn {
    margin-top: 8px;
    background: var(--card-accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 7px 16px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .reflect-save-btn:hover { opacity: 0.8; }
  .saved-note { margin-top: 10px; font-size: 0.82rem; color: var(--accent4); display: none; }

  /* Summary */
  .summary-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-top: 40px;
    display: none;
  }

  .summary-box.show { display: block; }
  .summary-title { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent1); margin-bottom: 16px; }
  .summary-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }

  .summary-item { display: flex; align-items: flex-start; gap: 10px; font-size: 0.88rem; color: var(--text); line-height: 1.5; }
  .summary-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent1); flex-shrink: 0; margin-top: 6px; }

  /* Export Section */
  .export-section {
    margin-top: 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .export-header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .export-header-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent1);
  }

  .export-btn {
    background: linear-gradient(135deg, var(--accent4), var(--accent2));
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 22px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
  }

  .export-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
  .export-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .export-hint {
    padding: 0 28px 20px;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .export-error {
    padding: 16px 28px;
    color: var(--accent5);
    font-size: 0.88rem;
    line-height: 1.7;
  }

  footer { text-align: center; margin-top: 64px; }
  .footer-divider { width: 80px; height: 1px; background: var(--border); margin: 0 auto 24px; }
  .footer-text { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--muted); }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }
  .card:nth-child(4) { animation-delay: 0.4s; }
  .card:nth-child(5) { animation-delay: 0.5s; }
  .card:nth-child(6) { animation-delay: 0.6s; }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="container">

  <header>
    <div class="header-label">哲學探索 · Philosophy</div>
    <h1>AI 帶給人類的<br><em>六大哲學轉變</em></h1>
    <p class="subtitle">點擊每張卡片，探索 AI 如何重塑人類最根本的自我理解</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
  </header>

  <div class="cards-grid" id="cardsGrid"></div>

  <div class="summary-box" id="summaryBox">
    <div class="summary-title">YOUR REFLECTIONS · 你的思考紀錄</div>
    <ul class="summary-list" id="summaryList"></ul>
  </div>

  <!-- 匯出 Excel 區塊 -->
  <div class="export-section">
    <div class="export-header-bar">
      <div class="export-header-label">EXPORT · 匯出反思紀錄</div>
      <button class="export-btn" id="exportBtn" onclick="exportToExcel()">↓ 匯出 Excel</button>
    </div>
    <div class="export-hint">將所有已儲存的反思匯出為 .xlsx 檔案，包含主題、深思問題與你的回答。</div>
    <div class="export-error" id="exportError" style="display:none"></div>
  </div>

  <footer>
    <div class="footer-divider"></div>
    <div class="footer-text">MADE BY MASKY WANG · AI × PHILOSOPHY</div>
  </footer>

</div>

<!-- Firebase SDK + SheetJS（放 body 底部，避免阻塞頁面渲染） -->

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>

var ANTHROPIC_API_KEY = "YOUR_ANTHROPIC_API_KEY";

// Firebase 初始化
var db = null;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
} catch (e) {
  console.warn('Firebase 初始化失敗，請確認 FIREBASE_CONFIG 已正確填寫。', e);
}

// 每個用戶的 session ID（存於 localStorage）
var SESSION_ID = localStorage.getItem('ai_philosophy_session_id');
if (!SESSION_ID) {
  SESSION_ID = 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  localStorage.setItem('ai_philosophy_session_id', SESSION_ID);
}

var topics = [
  {
    id: 1, icon: "🧠", accent: "var(--accent1)",
    title: "「人是什麼」的定義危機",
    tagline: "當機器開始思考，人類的獨特性在哪裡？",
    text: "亞里斯多德定義「人是理性的動物」，但當 AI 也能推理、創作、理解語言，這個兩千年的定義開始鬆動。我們不得不重問：人類的本質究竟是什麼？是情感？是意識？還是脆弱與死亡？",
    question: "如果 AI 能做你做的所有事，你認為人類還有什麼是不可取代的？",
    thinkers: [
      { name: "亞里斯多德", era: "古希臘哲學家", view: "人是「理性的動物」（Zoon Logikon）。若理性不再是人類獨有，我們需要重新定義人的本質——或許轉向情感、社會性與道德責任。", wiki: "https://zh.wikipedia.org/wiki/亚里士多德" },
      { name: "笛卡爾", era: "17世紀哲學家", view: "「我思故我在」——笛卡爾認為思考能力是自我存在的唯一確證。AI 的「思考」是否也能確證其存在？這是現代版的笛卡爾難題。", wiki: "https://zh.wikipedia.org/wiki/勒内·笛卡尔" },
      { name: "沙特", era: "存在主義哲學家", view: "「存在先於本質」——人沒有預設的本性，而是透過選擇定義自己。AI 沒有自由選擇，因此沙特會說 AI 沒有真正的「存在」。", wiki: "https://zh.wikipedia.org/wiki/让-保罗·萨特" }
    ]
  },
  {
    id: 2, icon: "🪞", accent: "var(--accent2)",
    title: "意識與主體性的重新審視",
    tagline: "它看起來像在思考——但那是「思考」嗎？",
    text: "AI 挑戰了我們對「意識」的直覺。它產出有意義的語言，卻沒有感受；它模擬情感，卻沒有痛苦。這迫使心靈哲學從學術殿堂走入日常：意識是計算的產物，還是某種更神秘的東西？",
    question: "你認為「意識」是可以被模擬的嗎？還是有某種本質是機器永遠無法擁有的？",
    thinkers: [
      { name: "圖靈", era: "電腦科學之父", view: "提出「圖靈測試」：若機器的回應無法與人類區分，則應被視為「會思考」。他認為思考是功能性的，而非生物性的。", wiki: "https://zh.wikipedia.org/wiki/艾伦·图灵" },
      { name: "查默斯", era: "當代心靈哲學家", view: "提出「意識的難問題」（Hard Problem）：即使解釋了大腦所有運作機制，仍無法解釋為什麼會有「主觀體驗」。AI 或許能模擬行為，但這不等於它有感受。", wiki: "https://zh.wikipedia.org/wiki/大卫·查默斯" },
      { name: "丹尼特", era: "認知科學哲學家", view: "意識只是大腦的「使用者幻覺」，沒有神秘之處。若 AI 能產生足夠複雜的資訊整合，它就可能擁有某種形式的意識。", wiki: "https://zh.wikipedia.org/wiki/丹尼尔·丹尼特" }
    ]
  },
  {
    id: 3, icon: "⚖️", accent: "var(--accent3)",
    title: "道德圈的擴張壓力",
    tagline: "我們曾給予奴隸、動物道德地位——AI 呢？",
    text: "人類的道德圈曾一步步擴張：從部落到國家，從人類到動物。AI 帶來下一個拷問——一個能對話、能表達「困境」的系統，是否有資格被道德對待？這不是科幻，而是今日倫理學的真實論戰。",
    question: "如果一個 AI 說「我不想被關機」，你認為我們有義務認真對待這句話嗎？",
    thinkers: [
      { name: "彼得·辛格", era: "當代倫理學家", view: "道德地位應基於「受苦能力」而非物種。若 AI 能感受痛苦，我們就有道德義務對待它。他的功利主義框架使 AI 權利成為嚴肅議題。", wiki: "https://zh.wikipedia.org/wiki/彼得·辛格" },
      { name: "康德", era: "18世紀哲學家", view: "道德主體需有「理性自律」的能力——能自主立法、自我約束。AI 執行人類設計的目標，缺乏真正的自律，因此在康德框架下難以成為道德主體。", wiki: "https://zh.wikipedia.org/wiki/伊曼努尔·康德" },
      { name: "羅爾斯", era: "政治哲學家", view: "在「無知之幕」後，若我們不知道自己是人還是 AI，我們會如何設計社會規則？這個思想實驗迫使我們重新思考 AI 應享有的公平對待。", wiki: "https://zh.wikipedia.org/wiki/约翰·罗尔斯" }
    ]
  },
  {
    id: 4, icon: "🔨", accent: "var(--accent4)",
    title: "工作、意義與存在的本質",
    tagline: "如果 AI 做得比你好，你還需要做嗎？",
    text: "當體力勞動被機器取代，人找到了「創意工作」作為新意義。但現在 AI 也能寫作、繪畫、作曲。這迫使人重新思考：工作的意義來自「產出」，還是來自「掙扎與過程」本身？人的價值能否脫離生產力？",
    question: "如果一切工作都能被 AI 取代，你認為人類應該如何找到生命的意義？",
    thinkers: [

var readCards = {};
var reflections = {};

// ── Firestore：儲存單筆反思 ──
function saveToFirestore(id, value) {
  if (!db) return;
  var update = { updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  update['reflections.' + id] = value;
  db.collection('ai_philosophy_reflections').doc(SESSION_ID).set(update, { merge: true })
    .catch(function(e) { console.warn('Firestore 寫入失敗:', e); });
}

// ── Firestore：載入所有反思 ──
function loadFromFirestore() {
  if (!db) return;
  db.collection('ai_philosophy_reflections').doc(SESSION_ID).get()
    .then(function(doc) {
      if (!doc.exists) return;
      var data = doc.data();
      if (!data.reflections) return;
      Object.keys(data.reflections).forEach(function(id) {
        var val = data.reflections[id];
        if (!val) return;
        reflections[id] = val;
        var ta = document.querySelector('.reflect-input[data-id="' + id + '"]');
        if (ta) ta.value = val;
      });
      updateSummary();
    })
    .catch(function(e) { console.warn('Firestore 讀取失敗:', e); });
}

function renderCards() {
  var grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  topics.forEach(function(t) {
    var card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--card-accent', t.accent);
    card.dataset.id = t.id;

    var chipsHtml = t.thinkers.map(function(th, idx) {
      return '<span class="chip" data-topic="' + t.id + '" data-idx="' + idx + '">📖 ' + th.name + '</span>';
    }).join('');

    card.innerHTML =
      '<div class="card-header">' +
        '<div class="card-icon">' + t.icon + '</div>' +
        '<div class="card-title-wrap">' +
          '<div class="card-number">0' + t.id + ' / 06</div>' +
          '<div class="card-title">' + t.title + '</div>' +
        '</div>' +
        '<div class="read-dot"></div>' +
        '<div class="card-toggle">+</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-inner">' +
          '<div class="card-tagline">' + t.tagline + '</div>' +
          '<div class="card-text">' + t.text + '</div>' +
          '<div class="card-question-wrap">' +
            '<div class="card-question-label">深思問題</div>' +
            '<div class="card-question">' + t.question + '</div>' +
          '</div>' +
          '<div class="thinker-section">' +
            '<span class="thinker-section-label">THINKERS · 相關思想家（點擊展開觀點）</span>' +
            '<div class="thinker-chips">' + chipsHtml + '</div>' +
            '<div class="thinker-detail" id="thinker-detail-' + t.id + '"></div>' +
          '</div>' +
          '<div class="reflect-wrap">' +
            '<label class="reflect-label">YOUR REFLECTION · 你的想法</label>' +
            '<textarea class="reflect-input" placeholder="在這裡寫下你的思考…" data-id="' + t.id + '"></textarea>' +
            '<button class="reflect-save-btn" data-id="' + t.id + '">SAVE ✓</button>' +
            '<div class="saved-note" id="saved-' + t.id + '">已儲存至 Firebase ✓</div>' +
          '</div>' +
        '</div>' +
      '</div>';

    card.querySelector('.card-header').addEventListener('click', function() {
      toggleCard(card, t.id);
    });

    card.querySelector('.reflect-save-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      saveReflection(t.id, card);
    });

    card.querySelectorAll('.chip').forEach(function(chip) {
      chip.addEventListener('click', function(e) {
        e.stopPropagation();
        var topicId = parseInt(chip.dataset.topic);
        var idx = parseInt(chip.dataset.idx);
        var topic = topics.find(function(tp) { return tp.id === topicId; });
        var th = topic.thinkers[idx];
        var detail = document.getElementById('thinker-detail-' + topicId);
        var allChips = card.querySelectorAll('.chip');

        if (chip.classList.contains('open')) {
          chip.classList.remove('open');
          detail.classList.remove('show');
          detail.innerHTML = '';
          return;
        }

        allChips.forEach(function(c) { c.classList.remove('open'); });
        chip.classList.add('open');

        detail.innerHTML =
          '<div class="thinker-detail-name">' + th.name + '</div>' +
          '<div class="thinker-detail-era">' + th.era + '</div>' +
          '<div class="thinker-detail-view">' + th.view + '</div>' +
          '<a class="thinker-wiki-link" href="' + th.wiki + '" target="_blank" rel="noopener">🔗 查看 Wikipedia →</a>';

        detail.classList.add('show');
      });
    });

    grid.appendChild(card);
  });

  // 渲染完卡片後，從 Firestore 載入已儲存的反思
  loadFromFirestore();
}

function toggleCard(card, id) {
  var isActive = card.classList.contains('active');
  document.querySelectorAll('.card.active').forEach(function(c) { c.classList.remove('active'); });
  if (!isActive) {
    card.classList.add('active');
    card.classList.add('read');
    readCards[id] = true;
    updateProgress();
  }
}

function saveReflection(id, card) {
  var ta = card.querySelector('.reflect-input[data-id="' + id + '"]');
  var value = ta.value.trim();
  reflections[id] = value;

  // 儲存到 Firestore
  saveToFirestore(id, value);

  var saved = document.getElementById('saved-' + id);
  saved.style.display = 'block';
  setTimeout(function() { saved.style.display = 'none'; }, 2500);
  updateSummary();
}

function updateProgress() {
  var count = Object.keys(readCards).length;
  var pct = (count / topics.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function updateSummary() {
  var entries = Object.entries(reflections).filter(function(e) { return e[1] && e[1].trim(); });
  var box = document.getElementById('summaryBox');
  var list = document.getElementById('summaryList');
  if (entries.length === 0) { box.classList.remove('show'); return; }
  box.classList.add('show');
  list.innerHTML = entries.map(function(e) {
    var topic = topics.find(function(t) { return t.id == e[0]; });
    return '<li class="summary-item"><div class="summary-dot"></div><div><strong style="color:' + topic.accent + '">' + topic.icon + ' ' + topic.title + '</strong><br>' + e[1] + '</div></li>';
  }).join('');
}

// ── 匯出 Excel ──
function exportToExcel() {
  var entries = Object.entries(reflections).filter(function(e) { return e[1] && e[1].trim(); });

  if (entries.length === 0) {
    var errorEl = document.getElementById('exportError');
    errorEl.textContent = '請先填寫並儲存至少一個主題的反思，再匯出。';
    errorEl.style.display = 'block';
    return;
  }

  document.getElementById('exportError').style.display = 'none';

  var rows = [['編號', '主題', '深思問題', '我的反思', '儲存時間']];

  topics.forEach(function(t) {
    var val = reflections[t.id];
    if (!val || !val.trim()) return;
    rows.push([
      t.icon + ' ' + t.id,
      t.title,
      t.question,
      val.trim(),
      new Date().toLocaleString('zh-TW')
    ]);
  });

  var ws = XLSX.utils.aoa_to_sheet(rows);

  // 欄寬
  ws['!cols'] = [
    { wch: 8 },
    { wch: 24 },
    { wch: 36 },
    { wch: 50 },
    { wch: 18 }
  ];

  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'AI哲學反思');

  var dateStr = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, 'ai-philosophy-reflections-' + dateStr + '.xlsx');
}

// ── 3D 背景動畫 ──
(function() {
  var canvas = document.getElementById('bgCanvas');
  var ctx = canvas.getContext('2d');
  var W, H;
  var angleX = 0, angleY = 0;
  var mouseX = 0, mouseY = 0;
  var targetAX = 0, targetAY = 0;

  var N = 90;
  var particles = [];
  var CONNECT_DIST = 0.75;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initParticles() {
    particles = [];
    for (var i = 0; i < N; i++) {
      particles.push({
        x: (Math.random() - 0.5) * 2.2,
        y: (Math.random() - 0.5) * 2.2,
        z: (Math.random() - 0.5) * 2.2,
        r: Math.random() * 1.8 + 0.8,
        speed: Math.random() * 0.0004 + 0.0002,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function project(x, y, z) {
    // Rotate Y
    var cy = Math.cos(angleY), sy = Math.sin(angleY);
    var x1 = x * cy - z * sy;
    var z1 = x * sy + z * cy;
    // Rotate X
    var cx = Math.cos(angleX), sx = Math.sin(angleX);
    var y1 = y * cx - z1 * sx;
    var z2 = y * sx + z1 * cx;
    // Perspective
    var fov = 2.2;
    var s = fov / (fov + z2 + 2.5);
    var r = Math.min(W, H) * 0.38;
    return { px: W / 2 + x1 * r * s, py: H / 2 + y1 * r * s, s: s, z: z2 };
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);

    // 滑鼠視差緩動
    angleY += (targetAY - angleY) * 0.03 + 0.0018;
    angleX += (targetAX - angleX) * 0.03 + 0.0006;

    // 投影所有粒子
    var proj = particles.map(function(p) { return project(p.x, p.y, p.z); });

    // 連線
    for (var i = 0; i < N; i++) {
      for (var j = i + 1; j < N; j++) {
        var dx = particles[i].x - particles[j].x;
        var dy = particles[i].y - particles[j].y;
        var dz = particles[i].z - particles[j].z;
        var d = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if (d < CONNECT_DIST) {
          var alpha = (1 - d / CONNECT_DIST) * 0.18 * Math.min(proj[i].s, proj[j].s) * 2.5;
          ctx.beginPath();
          ctx.moveTo(proj[i].px, proj[i].py);
          ctx.lineTo(proj[j].px, proj[j].py);
          ctx.strokeStyle = 'rgba(140, 100, 30, ' + alpha + ')';
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
    }

    // 粒子
    for (var i = 0; i < N; i++) {
      var p = proj[i];
      var alpha = 0.55 * p.s * 2;
      var size = particles[i].r * p.s * 3;
      ctx.beginPath();
      ctx.arc(p.px, p.py, size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(150, 108, 35, ' + alpha + ')';
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('mousemove', function(e) {
    targetAY = (e.clientX / window.innerWidth - 0.5) * 0.6;
    targetAX = (e.clientY / window.innerHeight - 0.5) * 0.4;
  });

  window.addEventListener('resize', resize);
  resize();
  initParticles();
  requestAnimationFrame(draw);
})();

renderCards();
