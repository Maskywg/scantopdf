<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GEM & GPT Hub</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5b52f0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="GEM Hub" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <style>
    :root {
      --bg: #f0f2f8;
      --surface: #ffffff;
      --surface2: #f5f6fc;
      --border: #dde0ee;
      --accent: #5b52f0;
      --accent2: #ff6584;
      --accent3: #18b96a;
      --text: #1a1a2e;
      --text-muted: #6b6e90;
      --card-hover: #f7f8ff;
      --shadow: 0 4px 20px rgba(91,82,240,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #eef0ff 0%, #f5f0ff 50%, #fff0f5 100%);
      padding: 48px 24px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 40%, rgba(91,82,240,0.10) 0%, transparent 70%),
                  radial-gradient(ellipse at 30% 70%, rgba(255,101,132,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-block;
      background: rgba(91,82,240,0.10);
      border: 1px solid rgba(91,82,240,0.25);
      color: #5b52f0;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      background: linear-gradient(90deg, #5b52f0, #ff6584, #18b96a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }
    .hero p {
      color: var(--text-muted);
      font-size: 16px;
      max-width: 480px;
      margin: 0 auto 28px;
    }
    .stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(240,242,248,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn-add {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      padding: 9px 14px 9px 38px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }

    /* ── Category Filters ── */
    .filters {
      padding: 16px 24px 4px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    /* ── Grid ── */
    .main { padding: 20px 24px 100px; }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 20px 0 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
      cursor: default;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--card-accent, var(--accent));
      border-radius: 16px 16px 0 0;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: rgba(108,99,255,0.3);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .card:hover::before { opacity: 1; }

    .card-header { display: flex; align-items: flex-start; gap: 12px; }
    .card-emoji {
      font-size: 28px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border-radius: 12px;
      flex-shrink: 0;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 5px;
    }
    .card-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(91,82,240,0.10);
      color: #5b52f0;
      border: 1px solid rgba(91,82,240,0.20);
    }
    .card-badge.gpt {
      background: rgba(24,185,106,0.10);
      color: #18b96a;
      border-color: rgba(24,185,106,0.25);
    }
    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }
    .card-footer { display: flex; gap: 8px; align-items: center; margin-top: auto; }
    .card-link {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
    }
    .card-link:hover { opacity: 0.9; transform: scale(1.01); }
    .card-link.gpt { background: linear-gradient(135deg, #10a37f, #1a7f5a); }
    .card-menu-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 10px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .card-menu-btn:hover { background: var(--border); color: var(--text); }
    .card-menu {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      z-index: 50;
      min-width: 120px;
      box-shadow: var(--shadow);
    }
    .card-menu.open { display: block; }
    .card-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
      color: var(--text);
    }
    .card-menu-item:hover { background: var(--border); }
    .card-menu-item.danger { color: #ff6b6b; }
    .card-menu-item.danger:hover { background: rgba(255,107,107,0.1); }

    /* ── Empty State ── */
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty h3 { font-size: 18px; margin-bottom: 6px; color: var(--text); }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(108,99,255,0.5);
      transition: all 0.2s;
      z-index: 200;
    }
    .fab:hover { background: #7d75ff; transform: scale(1.08) rotate(5deg); }
    .fab-label {
      position: fixed;
      bottom: 36px;
      right: 94px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateX(8px);
      transition: all 0.2s;
    }
    .fab:hover + .fab-label { opacity: 1; transform: translateX(0); }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 800;
    }
    .modal-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
    }
    .modal-close:hover { background: var(--border); color: var(--text); }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 7px;
      letter-spacing: 0.5px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
    }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-select option { background: var(--surface2); }

    .type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    .type-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .type-btn.active {
      border-color: var(--accent);
      background: rgba(108,99,255,0.15);
      color: var(--accent);
    }
    .type-btn.active.gpt {
      border-color: var(--accent3);
      background: rgba(67,233,123,0.12);
      color: var(--accent3);
    }
    .emoji-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .emoji-opt {
      font-size: 22px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .emoji-opt:hover, .emoji-opt.selected { border-color: var(--accent); background: rgba(108,99,255,0.15); transform: scale(1.1); }

    .form-actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn-cancel {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { background: var(--border); }
    .btn-submit {
      flex: 2;
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; }

    /* ── URL Step ── */
    .url-step { margin-bottom: 16px; }
    .url-primary { font-size: 14px; }
    .url-status {
      min-height: 22px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 7px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .url-status.detecting { color: var(--text-muted); }
    .url-status.success   { color: var(--accent3); }
    .url-status.manual    { color: #f6a623; }
    .url-status.error     { color: #ff6b6b; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.7s linear infinite;
    }

    /* ── Details section ── */
    .add-details { animation: slideUp 0.2s ease; }
    .add-details.hidden { display: none; }
    .detected-type-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .detected-type-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid;
    }
    .detected-type-chip.gem { background: rgba(91,82,240,0.10); color: #5b52f0; border-color: rgba(91,82,240,0.25); }
    .detected-type-chip.gpt { background: rgba(24,185,106,0.10); color: #18b96a; border-color: rgba(24,185,106,0.25); }

    /* ── Edit Modal ── */
    #editOverlay .modal-title { color: #5b52f0; }
    .edit-type-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .btn-switch-type {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-switch-type:hover { border-color: var(--accent); color: var(--accent); }
    .url-redetect-row {
      display: flex;
      gap: 8px;
    }
    .url-redetect-row .form-input { flex: 1; }
    .btn-redetect {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 40px;
      height: 40px;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-redetect:hover { border-color: var(--accent); background: rgba(91,82,240,0.08); transform: rotate(20deg); }
    .btn-redetect.spinning { animation: spin 0.7s linear infinite; pointer-events: none; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--accent3); color: var(--accent3); }
    .toast.error { border-color: #ff6b6b; color: #ff6b6b; }
  </style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-badge">AI 工具集</div>
  <h1>✦ GEM & GPT Hub</h1>
  <p>集中所有自製 AI 助理，一鍵啟動你的創意工作流</p>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">總工具數</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statGem">0</div>
      <div class="stat-label">Gemini GEMs</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statGpt">0</div>
      <div class="stat-label">ChatGPT GPTs</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statCat">0</div>
      <div class="stat-label">分類</div>
    </div>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" type="text" id="searchInput" placeholder="搜尋工具名稱或分類…" />
  </div>
  <button class="btn-add" id="toolbarAddBtn">＋ 新增工具</button>
</div>

<!-- Filters -->
<div class="filters" id="filtersContainer"></div>

<!-- Main Grid -->
<div class="main">
  <div class="section-title" id="resultLabel">所有工具</div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyState" style="display:none">
    <div class="empty-icon">🔍</div>
    <h3>沒有找到結果</h3>
    <p>試試其他關鍵字，或新增工具！</p>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn" title="新增工具">＋</button>
<div class="fab-label">新增 GEM / GPT</div>

<!-- Add Modal -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✦ 新增工具</div>
      <button class="modal-close" id="addClose">✕</button>
    </div>

    <!-- Step 1: URL -->
    <div class="url-step">
      <label class="form-label">貼上工具連結 *</label>
      <input class="form-input url-primary" id="addUrl"
        placeholder="貼上 Gemini GEM 或 ChatGPT GPT 連結…" autocomplete="off" />
      <div class="url-status" id="urlStatus"></div>
    </div>

    <!-- Step 2: Auto-filled details -->
    <div id="addDetails" class="add-details hidden">
      <div class="detected-type-row" id="detectedTypeRow"></div>
      <div class="form-group">
        <label class="form-label">工具名稱 *</label>
        <input class="form-input" id="addName" placeholder="輸入名稱…" />
      </div>
      <div class="form-group">
        <label class="form-label">分類</label>
        <select class="form-select" id="addCat">
          <option value="視覺化">🎨 視覺化</option>

function getCatEmoji(cat) {

  return map[cat] || '#6c63ff';
}

function filtered() {
  return gems.filter(g => {
    if (activeFilter === 'gem' && g.type !== 'gem') return false;
    if (activeFilter === 'gpt' && g.type !== 'gpt') return false;
    if (activeFilter !== 'all' && activeFilter !== 'gem' && activeFilter !== 'gpt' && g.cat !== activeFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!g.name.toLowerCase().includes(q) && !g.cat.toLowerCase().includes(q) && !(g.desc||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

// ── URL Auto-detection helpers ──
function detectTypeFromUrl(url) {
  if (/gemini\.google\.com\/gem\//i.test(url)) return 'gem';
  if (/chatgpt\.com\/g\/|chat\.openai\.com\/g\//i.test(url)) return 'gpt';
  return null;
}

function extractGptNameFromUrl(url) {
  const m = url.match(/\/g\/g-[a-zA-Z0-9]+-([^/?#]+)/);
  if (!m) return null;
  return m[1].replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

async function fetchPageTitle(url) {
  try {
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy, { signal: AbortSignal.timeout(6000) });
    if (!res.ok) return null;
    const data = await res.json();
    const m = data.contents?.match(/<title[^>]*>([^<]{1,120})<\/title>/i);
    return m ? m[1].trim() : null;
  } catch { return null; }
}

function guessCategory(name) {
  const n = name.toLowerCase();
  if (/視覺|影像|繪|動畫|分鏡|pixel|image|visual|photo|圖像/.test(n)) return '視覺化';
  if (/音樂|suno|music|歌|melody|song|樂曲/.test(n)) return '音樂';
  if (/研究|分析|報告|research|analysis|數據|調查/.test(n)) return '研究分析';
  if (/角色|扮演|移民|兵法|軍師|role|play|歷史人物|穿越/.test(n)) return '角色扮演';
  if (/翻譯|語言|詩詞|古典|language|translate/.test(n)) return '語言';
  if (/思維|訓練|邏輯|think|train|腦力/.test(n)) return '思維訓練';
  if (/機器人|指令|架構|bot|command|robot|程式|coding/.test(n)) return '技術';
  if (/qr|code|工具|tool|生成器|generator|快速/.test(n)) return '工具';
  if (/創意|文學|金句|漫畫|腳本|詩|故事|吐槽|敘事|creative|story|poem|script/.test(n)) return '創意文學';
  return '其他';
}

  document.getElementById('detectedTypeRow').innerHTML = '';
  setUrlStatus('', '');
  addType = 'gem';
  selectedEmoji = '✨';
  clearTimeout(urlDetectTimer);
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(() => document.getElementById('addUrl').focus(), 80);
}
function closeAddModal() { document.getElementById('addOverlay').classList.remove('open'); }

// URL paste/input → auto-detect
let urlDetectTimer;
document.getElementById('addUrl').addEventListener('input', e => {
  clearTimeout(urlDetectTimer);
  const url = e.target.value.trim();
  if (!url.startsWith('http')) { setUrlStatus('', ''); document.getElementById('addDetails').classList.add('hidden'); return; }

  const type = detectTypeFromUrl(url);
  setUrlStatus('detecting', '識別中…');

  urlDetectTimer = setTimeout(async () => {
    let name = null;

    // GPT: try extracting from URL slug first
    if (type === 'gpt') name = extractGptNameFromUrl(url);

    // Try CORS proxy for title
    if (!name) {
      name = await fetchPageTitle(url);
      // Clean up common suffixes
      if (name) name = name.replace(/\s*[-|–]\s*(Gemini|ChatGPT|OpenAI).*$/i, '').trim();
    }

    if (name) {
      const cat = guessCategory(name);
      showAddDetails(type, name, cat);
      setUrlStatus('success', `✓ 已識別為 ${type === 'gpt' ? 'ChatGPT GPT' : 'Gemini GEM'}，名稱與分類已自動填入`);
    } else {
      showAddDetails(type, '', type === 'gpt' ? '工具' : '其他');
      setUrlStatus('manual', `⚡ 已識別為 ${type === 'gpt' ? 'ChatGPT GPT' : 'Gemini GEM'}，請手動填入名稱`);
    }
  }, 500);
});

document.getElementById('fabBtn').addEventListener('click', openAddModal);
document.getElementById('addClose').addEventListener('click', closeAddModal);
document.getElementById('addCancelBtn').addEventListener('click', closeAddModal);
document.getElementById('addOverlay').addEventListener('click', e => { if(e.target === document.getElementById('addOverlay')) closeAddModal(); });

document.getElementById('addSubmitBtn').addEventListener('click', () => {
  const name = document.getElementById('addName').value.trim();
  const url  = document.getElementById('addUrl').value.trim();
  const cat  = document.getElementById('addCat').value;
  const desc = document.getElementById('addDesc').value.trim();
  if (!url)  return toast('請貼上工具連結', 'error');
  if (!url.startsWith('http')) return toast('連結格式不正確', 'error');
  if (!name) return toast('請填入工具名稱', 'error');
  const id = Date.now().toString();
  gems.push({ id, type: addType, name, url, cat, desc, emoji: selectedEmoji || '✨' });
  save(); render(); closeAddModal();
  toast(`✓ 已新增「${name}」`, 'success');
});

// ── Edit ──
function updateEditTypeChip(type) {
  editType = type;
  const chip = document.getElementById('editTypeChip');
  if (type === 'gpt') {
    chip.className = 'detected-type-chip gpt';
    chip.textContent = '🟢 ChatGPT GPT';
  } else {
    chip.className = 'detected-type-chip gem';
    chip.textContent = '🔷 Gemini GEM';
  }
}

function setEditUrlStatus(state, text) {
  const el = document.getElementById('editUrlStatus');
  el.className = 'url-status ' + state;
  el.innerHTML = state === 'detecting' ? `<span class="spinner"></span> ${text}` : text;
}

function editGem(id) {
  const g = gems.find(x => x.id === id);
  if (!g) return;
  document.getElementById('editId').value = id;
  document.getElementById('editName').value = g.name;
  document.getElementById('editUrl').value = g.url;
  document.getElementById('editCat').value = g.cat;
  document.getElementById('editDesc').value = g.desc || '';
  editSelectedEmoji = g.emoji || '✨';
  updateEditTypeChip(g.type || 'gem');
  setEditUrlStatus('', '');
  renderEmojiPicker('editEmojiPicker', editSelectedEmoji, e => { editSelectedEmoji = e; });
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(() => document.getElementById('editName').focus(), 80);
  openMenuId = null;
}

function closeEditModal() { document.getElementById('editOverlay').classList.remove('open'); }
document.getElementById('editClose').addEventListener('click', closeEditModal);
document.getElementById('editCancelBtn').addEventListener('click', closeEditModal);
document.getElementById('editOverlay').addEventListener('click', e => { if(e.target === document.getElementById('editOverlay')) closeEditModal(); });

// Switch type button
document.getElementById('editSwitchTypeBtn').addEventListener('click', () => {
  updateEditTypeChip(editType === 'gem' ? 'gpt' : 'gem');
});

// Re-detect button
document.getElementById('editRedetectBtn').addEventListener('click', async () => {
  const url = document.getElementById('editUrl').value.trim();
  if (!url.startsWith('http')) return toast('請先填入正確連結', 'error');
  const btn = document.getElementById('editRedetectBtn');
  btn.classList.add('spinning');
  setEditUrlStatus('detecting', '識別中…');

  const type = detectTypeFromUrl(url);
  if (type) updateEditTypeChip(type);

  let name = (type === 'gpt') ? extractGptNameFromUrl(url) : null;
  if (!name) name = await fetchPageTitle(url);
  if (name) name = name.replace(/\s*[-|–]\s*(Gemini|ChatGPT|OpenAI).*$/i, '').trim();

  btn.classList.remove('spinning');
  if (name) {
    document.getElementById('editName').value = name;
    const cat = guessCategory(name);
    document.getElementById('editCat').value = cat;
    editSelectedEmoji = CAT_EMOJI_MAP[cat] || '✨';
    renderEmojiPicker('editEmojiPicker', editSelectedEmoji, e => { editSelectedEmoji = e; });
    setEditUrlStatus('success', '✓ 名稱與分類已重新識別');
  } else {
    setEditUrlStatus('manual', '⚡ 無法自動取得名稱，請手動修改');
  }
});

document.getElementById('editSubmitBtn').addEventListener('click', () => {
  const id   = document.getElementById('editId').value;
  const name = document.getElementById('editName').value.trim();
  const url  = document.getElementById('editUrl').value.trim();
  const cat  = document.getElementById('editCat').value;
  const desc = document.getElementById('editDesc').value.trim();
  if (!name) return toast('請輸入工具名稱', 'error');
  if (!url)  return toast('請輸入工具連結', 'error');
  const idx = gems.findIndex(x => x.id === id);
  if (idx === -1) return;
  gems[idx] = { ...gems[idx], type: editType, name, url, cat, desc, emoji: editSelectedEmoji || '✨' };
  save(); render(); closeEditModal();
  toast(`✓「${name}」已儲存`, 'success');
});

// ── Delete ──
function deleteGem(id) {
  const g = gems.find(x => x.id === id);
  if (!g) return;
  if (!confirm(`確定要刪除「${g.name}」嗎？`)) { openMenuId = null; render(); return; }
  gems = gems.filter(x => x.id !== id);
  save(); render();
  toast(`已刪除「${g.name}」`);
}

// ── Emoji Picker ──
function renderEmojiPicker(containerId, selected, onSelect) {
  const container = document.getElementById(containerId);
  container.innerHTML = EMOJIS.map(e => `
    <div class="emoji-opt ${e === selected ? 'selected' : ''}" onclick="selectEmoji('${containerId}', '${e}', arguments[0])">
      ${e}
    </div>`).join('');
  container._onSelect = onSelect;
}

function selectEmoji(containerId, emoji, e) {
  const container = document.getElementById(containerId);
  container.querySelectorAll('.emoji-opt').forEach(el => el.classList.remove('selected'));
  e.currentTarget.classList.add('selected');
  if (container._onSelect) container._onSelect(emoji);
}

// ── Toast ──
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2800);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeAddModal(); closeEditModal(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────
load();
render();

// Unregister any old service workers to clear stale caches
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
}
</script>
</body>
</html>
